<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>NEO百</title>
  <script>window.__appStart = Date.now();</script>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NEO百">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Klee+One:wght@400;600&family=Noto+Serif+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/styles.css">

  <style>
    /* スプラッシュ:中央寄せ + 観音開きで左右に消える */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      overflow: hidden;
      transition: opacity 0.4s ease-out;
    }
    .splash-half {
      position: absolute;
      top: 0;
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      transition: transform 0.7s cubic-bezier(0.66, 0, 0.34, 1);
    }
    .splash-left { left: 0; }
    .splash-right { left: 50vw; }
    .splash-half-inner {
      position: absolute;
      top: 50%;
      width: 100vw;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
    }
    .splash-left .splash-half-inner { left: 0; }
    .splash-right .splash-half-inner { left: -50vw; }
    .splash-logo {
      height: 70vh;
      max-height: 600px;
      width: auto;
      max-width: 90vw;
    }
    #splash.open .splash-left { transform: translateX(-100%); }
    #splash.open .splash-right { transform: translateX(100%); }
    #splash.gone { display: none; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module">
    import htm from 'https://unpkg.com/htm@3.1.1/dist/htm.module.js?module';
    window.htm = htm;
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-half splash-left">
      <div class="splash-half-inner"><img class="splash-logo" src="./splash.png" alt=""></div>
    </div>
    <div class="splash-half splash-right">
      <div class="splash-half-inner"><img class="splash-logo" src="./splash.png" alt=""></div>
    </div>
  </div>

  <div id="root">
    <div class="loading">
      <div class="loading-mark">帳</div>
      <div class="loading-text">読み込み中</div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>

  <script>
    // スプラッシュを必ず閉じる(main.js の状態に依存しない)
    (function closeSplash() {
      var splash = document.getElementById('splash');
      if (!splash) return;
      var MIN_SHOW = 2500;
      var start = window.__appStart || Date.now();
      var wait = Math.max(0, MIN_SHOW - (Date.now() - start));
      setTimeout(function () {
        splash.classList.add('open');
        setTimeout(function () { splash.classList.add('gone'); }, 750);
      }, wait);
    })();
  </script>

  <script>
    // Service Worker 登録 + 新バージョン検知バナー
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => {
            // すでに「待機中」のSWがあれば即バナー表示
            if (reg.waiting && navigator.serviceWorker.controller) {
              showUpdateBanner(reg.waiting);
            }
            // 新しいSWが見つかったら状態変化を見張る
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBanner(newWorker);
                }
              });
            });
          })
          .catch(err => console.warn('SW registration failed:', err));

        // SW が切り替わったら1回だけリロード
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }

    function showUpdateBanner(worker) {
      if (document.getElementById('updateBanner')) return;
      const bar = document.createElement('div');
      bar.id = 'updateBanner';
      bar.innerHTML =
        '<span class="ub-text">新しいバージョンがあります</span>' +
        '<button class="ub-btn" type="button">更新</button>';
      document.body.appendChild(bar);
      bar.querySelector('.ub-btn').addEventListener('click', () => {
        worker.postMessage({ type: 'SKIP_WAITING' });
      });
    }
  </script>
</body>
</html>
