<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>NEO百</title>
  <script>window.__appStart = Date.now();</script>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NEO百">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Klee+One:wght@400;600&family=Noto+Serif+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/styles.css">

  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      overflow: hidden;
    }
    .splash-half {
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      transition: transform 0.7s cubic-bezier(0.66, 0, 0.34, 1);
    }
    .splash-half-inner {
      width: 100vw;
      height: 100vh;
      background-image: url('./splash.png');
      background-size: cover;
      background-position: center;
    }
    .splash-right .splash-half-inner {
      margin-left: -50vw;
    }
    #splash.open .splash-left {
      transform: translateX(-100%);
    }
    #splash.open .splash-right {
      transform: translateX(100%);
    }
    #splash.gone {
      display: none;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module">
    import htm from 'https://unpkg.com/htm@3.1.1/dist/htm.module.js?module';
    window.htm = htm;
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-half splash-left"><div class="splash-half-inner"></div></div>
    <div class="splash-half splash-right"><div class="splash-half-inner"></div></div>
  </div>

  <div id="root">
    <div class="loading">
      <div class="loading-mark">帳</div>
      <div class="loading-text">読み込み中</div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
